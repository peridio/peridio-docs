                  type: object
                  properties:
                    signature:
                      $ref: "#/components/schemas/binary-signature-signature"
                    signing_key_prn:
                      $ref: "#/components/schemas/prn"
          size:
            $ref: "#/components/schemas/binary-size"
          target:
            $ref: "#/components/schemas/target-triplet"
          url:
            type: string
    tunnel:
