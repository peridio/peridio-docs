                cidr_block_allowlist:
                  $ref: "#/components/schemas/cidr-block-allowlist"
                ttl:
                  type: number
                  default: 3600
                  description: The amount of time in seconds that the tunnel is available for.
                  minimum: 1
                  maximum: 3600
              required:
                - device_prn
                - device_tunnel_port
      responses:
        "201":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  tunnel:
                    $ref: "#/components/schemas/tunnel"
