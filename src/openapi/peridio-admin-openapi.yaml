          type: string
        not_after:
          type: string
          format: date-time
        not_before:
          type: string
          format: date-time
        prn:
          $ref: "#/components/schemas/ca-certificate-prn"
        serial:
          $ref: "#/components/schemas/ca-certificate-serial"
    ca-certificate-prn:
      allOf:
        - $ref: "#/components/schemas/prn"
