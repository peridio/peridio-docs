components:
  securitySchemes:
    api_key:
      type: apiKey
      name: Authorization
      in: "header"
      description: Legacy API Keys. The header value must be `Bearer API_KEY_VALUE`.
    api_key_v2:
      type: apiKey
      name: Authorization
      in: "header"
      description: API Keys. The header value must be `Bearer API_KEY_VALUE`.
  parameters:
    limit:
      in: query
      name: limit
      description: Specifies the max length of the returned results.
      schema:
        default: 10
        maximum: 100
        minimum: 1
        type: integer
    order:
      in: query
      name: order
      description: Controls whether the order of results is ascending or descending by `inserted_at`.
      schema:
        type: string
        enum:
          - asc
          - desc
    search:
      in: query
      name: search
      description: |
        A search query per the [search query language](#section/Search-Query-Language).
      schema:
        type: string
    page:
      in: query
      name: page
      description: |
        A cursor for pagination across multiple pages of results. Don't include this parameter on
        the first call. Use the `next_page` value returned in a previous response to request
        subsequent results.
      schema:
        type: string
    peridio-signature:
      name: peridio-signature
      in: header
      description: The webhook signature. See [signature verification](/platform/reference/webhooks#signature-verification).
      schema:
        type: string
        examples:
          one:
            value: FC825FCAA2E4C2688F075144105B75C2943D8B88AC4B5FAB134F2676A63FB6EF
            summary: One signature.
          two:
            value: FC825FCAA2E4C2688F075144105B75C2943D8B88AC4B5FAB134F2676A63FB6EF,AC4B5FAB134F2676A63FB6EAAC825FCEA2E4C23B8F045134155B55C2943D8B51
            summary: Two signatures while secrets are being rolled.
    peridio-published-at:
      name: peridio-published-at
      in: header
      description: The timestamp of when the event was published (not created). See [signature verification](/platform/reference/webhooks#signature-verification).
      schema:
        type: string
        format: date-time
    event_inserted_at_lt:
      name: inserted_at_lt
      in: query
      description: |
        The ending date point of the range of the query

        Must be greater than event_inserted_at_gte.
      schema:
        type: date-time
    event_inserted_at_gte:
      name: inserted_at_gte
      in: query
      description: |
        The starting date point of the range of the query

        Must be lower than event_inserted_at_lt.
      schema:
        type: date-time
    event_actor_prn:
      name: actor_prn
      in: query
      description: |
        Filter events by actor PRN.
      schema:
        $ref: "#/components/schemas/prn"
    event_resource_prn:
      name: resource_prn
      in: query
      description: |
        Filter events by resource PRN.
      schema:
        $ref: "#/components/schemas/prn"
    event_type:
      name: type
      in: query
      description: |
        Filter events by type.
      schema:
        type: string
        enum:
          - device
          - webhook
          - api_key
    event_subtype:
      name: subtype
      in: query
      description: |
        Filter events by subtype.
      schema:
        type: string
        enum:
          - release_changed
          - claimed_release
          - checked_for_release
          - connected
          - updated
          - authentication_failed
          - created
          - request_failed
          - test_fire
  schemas:
    api-key-created-event:
      type: object
      properties:
        data:
          type: object
          description: Data associated with the `api-key` event type.
          properties:
            type:
              type: string
              enum:
                - created
            data:
              type: object
              description: Data associated with the `created` subevent type.
              properties:
                api_key_prn:
                  $ref: "#/components/schemas/api-key-prn"
                creator_prn:
                  $ref: "#/components/schemas/user-prn"
        inserted_at:
          type: string
          format: date-time
        prn:
          $ref: "#/components/schemas/event-prn"
        type:
          type: string
          enum:
            - api_key
        version:
          type: integer
          enum:
            - 1
    api-key-prn:
      allOf:
        - $ref: "#/components/schemas/prn"
        - example: "prn:1:be4d30b4-de6b-47cd-85ea-a75e23fd63ef:api_key:b3f1f699-3bc8-4c77-bda2-b974595d5e3f"
    array-of-artifacts:
      type: array
      items:
        $ref: "#/components/schemas/artifact"
    array-of-ordered-artifact-versions:
      type: array
      items:
        $ref: "#/components/schemas/artifact-version-item"
    array-of-artifact-versions:
      type: array
      items:
        $ref: "#/components/schemas/artifact-version"
    array-of-artifact-version-prns:
      type: array
      items:
        $ref: "#/components/schemas/prn"
    array-of-binaries:
      type: array
      items:
        $ref: "#/components/schemas/binary"
    array-of-binary-parts:
      type: array
      items:
        $ref: "#/components/schemas/binary-part"
    array-of-bundles:
      type: array
      items:
        $ref: "#/components/schemas/bundle"
    array-of-ca-certificates:
      type: array
      items:
        $ref: "#/components/schemas/ca-certificate"
    array-of-ca-jitp-tags:
      type: array
      items:
        $ref: "#/components/schemas/ca-jitp-tag"
    array-of-cohorts:
      type: array
      items:
        $ref: "#/components/schemas/cohort"
    array-of-deployments:
      type: array
      items:
        $ref: "#/components/schemas/deployment"
    array-of-device-certificates:
      type: array
      items:
        $ref: "#/components/schemas/device-certificate"
    array-of-device-tags:
      type: array
      items:
        $ref: "#/components/schemas/device-tag"
    array-of-devices:
      type: array
      items:
        $ref: "#/components/schemas/device"
    array-of-events:
      type: array
      items:
        $ref: "#/components/schemas/event"
    array-of-firmware:
      type: array
      items:
        $ref: "#/components/schemas/firmware"
    array-of-products:
      type: array
      items:
        $ref: "#/components/schemas/product"
    array-of-releases:
      type: array
      items:
        $ref: "#/components/schemas/release"
    array-of-signatures:
      default: null
