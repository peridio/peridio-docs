  /binary_signatures:
    post:
      operationId: create-a-binary-signature
      summary: Create a binary signature
      tags:
        - "Binary Signatures"
      description: |
        Attach a signature to a binary.

        This endpoint must be used against a binary that is already uploaded completely. The
        request will fail if the signature is invalid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                binary_prn:
                  $ref: "#/components/schemas/prn"
                signing_key_prn:
                  $ref: "#/components/schemas/prn"
                signature:
                  $ref: "#/components/schemas/binary-signature-signature"
              required:
                - binary_prn
                - signing_key_prn
                - signature
      responses:
        "201":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  binary_signature:
                    $ref: "#/components/schemas/binary-signature"
