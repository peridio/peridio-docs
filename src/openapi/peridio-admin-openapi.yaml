          description: Ok.
  device_connected:
    post:
      security: []
      summary: Connected
      description: |
        See the [webhooks reference](/platform/reference/webhooks#supported-events) for a list of supported events.

        This event is created when a device successfully completes a TLS handshake while connecting to the Peridio Device API.
      operationId: device-connected
