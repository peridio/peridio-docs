        organization_prn:
          $ref: "#/components/schemas/prn"
        prn:
          $ref: "#/components/schemas/prn"
        inserted_at:
          type: string
          format: date-time
        product_prn:
          $ref: "#/components/schemas/prn"
        updated_at:
          type: string
