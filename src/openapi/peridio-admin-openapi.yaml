        hash:
          $ref: "#/components/schemas/binary-hash"
        organization_prn:
          $ref: "#/components/schemas/prn"
        prn:
          $ref: "#/components/schemas/prn"
        inserted_at:
          type: string
          format: date-time
        signatures:
          $ref: "#/components/schemas/array-of-signatures"
        size:
          $ref: "#/components/schemas/binary-size"
        state:
