          $ref: "#/components/schemas/release-disabled"
        name:
          $ref: "#/components/schemas/release-name"
        next_release_prn:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/prn"
        organization_prn:
          $ref: "#/components/schemas/prn"
        phase_mode:
          $ref: "#/components/schemas/release-phase-mode"
        phase_tags:
          $ref: "#/components/schemas/release-phase-tags"
        phase_type:
          $ref: "#/components/schemas/release-phase-type"
        phase_value:
          $ref: "#/components/schemas/release-phase-value"
        required:
          $ref: "#/components/schemas/release-required"
        schedule_date:
          $ref: "#/components/schemas/release-schedule-availability"
        schedule_complete:
          $ref: "#/components/schemas/release-schedule-complete"
        prn:
          $ref: "#/components/schemas/prn"
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        version:
          $ref: "#/components/schemas/release-version"
        version_requirement:
          $ref: "#/components/schemas/release-version-requirement"
    release-disabled:
      description: |
        If a release is marked as disabled it cannot be resolved during release resolution.
      type: boolean
    release-phase-mode:
      description: |
        Describes if this release is using tag or numeric based phasing. tags or phase value for resolution

        - `tags` - Phases rollout of the release according to the `phase_tags` field.
        - `numeric` - Phases rollout of the release according to the `phase_value` field.
      type: string
      enum:
        - "tags"
        - "numeric"
    release-phase-tags:
      description: |
        Limits by tags the devices that are allowed to update to this release.

        **Required if:** `phase_mode` is `tags`.

        When `phase_mode` is `tags`, this field only allows devices to update to this release if they have at least one of these tags.

      $ref: "#/components/schemas/array-of-device-tags"
    release-phase-value:
      description: |
        Limits by percent or static count the number of devices that are allowed to update to this release.

        **Required if:** `phase_mode` is `numeric`.

        When `phase_mode` is `numeric`, this field only allows devices to update to this release if fewer than a certain number have already updated.

        - Decimals and integers in the range [0, 1] are treated as percents, e.g., to allow 20% of the cohort to update, you would specifiy a `phase_value` of `0.2`.
        - Integers in the range [2, 1,000,000,000] are treated as absolute device counts, e.g., to allow 40 of the cohort's devices to update, you would specifiy a `phase_value` of `40`.

        **NOTE:** `1` is a special value in that it represents `100%` and  once a release is updated to this value, the phase value can never be changed again.

        A release with a `phase_value` not equal to `1` is considered "phased".

        **NOTE:** There can only ever be a single release that is phased at a time within a cohort. Because of this, if there is already a phased release, it must be "completed" by setting the phase to `1`.
      type: number
      minimum: 0.0
      maximum: 1_000_000_000
    release-phase-type:
      type: string
      enum:
        - "static"
        - "percent"
    release-prn:
      allOf:
        - $ref: "#/components/schemas/prn"
        - example: "prn:1:be4d30b4-de6b-47cd-85ea-a75e23fd63ef:release:b3f1f699-3bc8-4c77-bda2-b974595d5e3f"
    release-description:
      default: null
      oneOf:
        - type: string
        - type: "null"
    release-name:
      type: string
    release-required:
      type: boolean
      description: |
        If `true`, this release must be passed through if encountered by a device.

        If `false`, this release will be skipped over when possible (if there are releases configured after it).
    release-schedule-availability:
      type: string
      format: date-time
      description: Before this date-time, the release will not be resolvable when checking for updates. You may use this to schedule a future release.
    release-schedule-complete:
      type: boolean
    release-version:
      description: The release version. If provided, it has to be a valid [version](https://hexdocs.pm/elixir/Version.html#content). Used in [dynamic release resolution](/platform/reference/releases#dynamic-resolution).
      example: 1.0.0
      type: string
    release-known:
      description: Whether the release is known to Peridio or not.
      example: true
      type: boolean
    release-version-requirement:
      description: The release version requirement. If provided, it has to be a valid [requirement](https://hexdocs.pm/elixir/Version.html#module-requirements). Used in [dynamic release resolution](/platform/reference/releases#dynamic-resolution).
      example: == 1.0.0
      type: string
    role-name:
      enum:
        - admin
        - read
        - read
        - write
    search-with-org:
      type: string
      description: |
        The `organization_prn` is required as part of the search.
      example: organization_prn:'prn:1:be4d30b4-de6b-47cd-85ea-a75e23fd63ef'
    serial:
      type: string
      example: "522154175989108335861639249273408275957749326848"
    signing-signature:
      type: object
