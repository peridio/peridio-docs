  device_release_changed:
    post:
      security: []
      summary: Release changed
      description: |
        See the [webhooks reference](/platform/reference/webhooks#supported-events) for a list of supported events.

        This event is created when a device informs Peridio of its current release or bundle via the `peridio-release-prn` or `peridio-bundle-prn` headers, and that release or bundle is different than the one Peridio currently had on record. In cases where a `peridio-bundle-prn` header is supplied, the `to_release` property will be `null`.

        For example, if Peridio thought the device was on release 1, but then the device informed Peridio it was on release 2, then this event would be created going from 1 to 2 along with the new release's bundle. Similarly, if Peridio thought the device was on bundle 1, but then the device informed Peridio it was on bundle 2, then this event would be created going from bundle 1 to 2, with a `to_release` of `null`.
      operationId: device-release-changed
      tags:
        - Device Events
      parameters:
        - $ref: "#/components/parameters/peridio-signature"
        - $ref: "#/components/parameters/peridio-published-at"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/device-release-changed-event"
      responses:
        200:
          description: Ok.
