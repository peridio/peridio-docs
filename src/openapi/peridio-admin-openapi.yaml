          type: string
          format: date-time
    binary-description:
      type: string
      minLength: 1
      maxLength: 256
    binary-hash:
      description: The lowercase hex encoding of the SHA256 hash of the binary's data.
      type: string
    binary-size:
      description: The expected size in bytes of the binary.
      example: 1800000
      maximum: 53_687_091_200_000
      minimum: 0
      type: integer
    binary-state:
      description: The binary state
      type: string
      enum:
        - "uploadable"
        - "hashable"
        - "hashing"
        - "signable"
        - "signed"
        - "destroyed"
    binary-signature-signature:
      type: string
      description: |
        The lowercase hex encoding of the ed25519 signature of the base16 encoding of the SHA256 hash of the binary.
    binary-signature:
      type: object
      properties:
        binary_prn:
          $ref: "#/components/schemas/prn"
        organization_prn:
          $ref: "#/components/schemas/prn"
        prn:
          $ref: "#/components/schemas/prn"
        signature:
          $ref: "#/components/schemas/binary-signature-signature"
        signing_key_prn:
          $ref: "#/components/schemas/prn"
        inserted_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    binary-part:
      type: object
      properties:
        binary_prn:
          $ref: "#/components/schemas/prn"
        hash:
          $ref: "#/components/schemas/binary-part-hash"
        index:
          $ref: "#/components/schemas/binary-part-index"
        inserted_at:
          type: string
          format: date-time
        organization_prn:
          $ref: "#/components/schemas/prn"
        prn:
          $ref: "#/components/schemas/prn"
        size:
          $ref: "#/components/schemas/binary-part-size"
        state:
          $ref: "#/components/schemas/binary-part-state"
        updated_at:
          type: string
          format: date-time
    binary-part-hash:
      description: The lowercase hex encoding of the SHA256 hash of the binary part's data.
      type: string
    binary-part-index:
      description: The binary part index order
      type: integer
    binary-part-size:
      description: The expected size in bytes of the binary part.
      example: 1800000
      maximum: 5_368_709_120
      minimum: 5_242_880
      type: integer
    binary-part-state:
      description: The binary part state
      type: string
      enum:
        - "uploadable"
        - "invalid_size"
        - "invalid_hash"
        - "valid"
    bundle:
