        See the [webhooks reference](/platform/reference/webhooks#supported-events) for a list of supported events.

        This event is created when a device checks for an update with [get-update](/device-api#devices/operation/get-update).
      operationId: device-checked-for-release
      tags:
        - Device Events
      parameters:
        - $ref: "#/components/parameters/peridio-signature"
        - $ref: "#/components/parameters/peridio-published-at"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/device-checked-for-release-event"
      responses:
        200:
          description: Ok.
  device_claimed_release:
    post:
      security: []
      summary: Claimed release
      description: |
        See the [webhooks reference](/platform/reference/webhooks#supported-events) for a list of supported events.

        This event is created when a device claims access to a phased release during a [get-update](/device-api#devices/operation/get-update).
      operationId: device-claimed-release
      tags:
        - Device Events
