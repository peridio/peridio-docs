  /releases:
    post:
      operationId: create-a-release
      summary: Create a release
      tags:
        - Releases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                bundle_prn:
                  $ref: "#/components/schemas/prn"
                  description: The bundle the release will distribute to devices.
                phase_mode:
                  $ref: "#/components/schemas/release-phase-mode"
                  default: "numeric"
                phase_tags:
                  $ref: "#/components/schemas/release-phase-tags"
                phase_value:
                  $ref: "#/components/schemas/release-phase-value"
                cohort_prn:
                  $ref: "#/components/schemas/prn"
                  description: The cohort to create the release within, and in turn the cohort it will distribute its bundle to.
                description:
                  $ref: "#/components/schemas/release-description"
                disabled:
                  $ref: "#/components/schemas/release-disabled"
                name:
                  $ref: "#/components/schemas/release-name"
                next_release_prn:
                  $ref: "#/components/schemas/prn"
                  description: |
                    If omitted, the release will be created as latest within the cohort. If there is already at least one release in the cohort, then the latest release in that cohort would have its `next_release_prn` updated to this created release.

                    If supplied, the release will be created prior to the release identified by `next_release_prn`. If you wish to insert this release between two other releases, you may additionally supply `previous_release_prn`. If you supply neither field, it will create the release as the latest automatically.
                previous_release_prn:
                  $ref: "#/components/schemas/prn"
                  description: |
                    If omitted, `next_release_prn` will dictate where to create this release within the cohort's release graph.

                    In order to insert a release between two other releases, `next_release_prn` is required to be supplied as well. If you supply neither field, it will create the release as the latest automatically.
                required:
                  $ref: "#/components/schemas/release-required"
                schedule_date:
                  $ref: "#/components/schemas/release-schedule-availability"
                version:
                  $ref: "#/components/schemas/release-version"
                version-requirement:
                  $ref: "#/components/schemas/release-version-requirement"
              required:
                - bundle_prn
                - cohort_prn
                - name
                - required
                - schedule_date
      responses:
        "201":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  release:
                    $ref: "#/components/schemas/release"
