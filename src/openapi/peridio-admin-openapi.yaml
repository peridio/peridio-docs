webhooks:
  api_key_created:
    post:
      security: []
      summary: Created
      description: |
        See the [webhooks reference](/platform/reference/webhooks#supported-events) for a list of supported events.

        This event is created when an api key is created.
      operationId: api-key-created
      tags:
        - API Key Events
      parameters:
        - $ref: "#/components/parameters/peridio-signature"
