                  oneOf:
                    - type: object
                      properties:
                        prn:
                          $ref: "#/components/schemas/bundle-prn"
                        name:
                          $ref: "#/components/schemas/bundle-name"
                    - type: null
                      description: " "
        inserted_at:
          type: string
          format: date-time
        prn:
          $ref: "#/components/schemas/event-prn"
        type:
          type: string
          enum:
            - device
        version:
          type: integer
          enum:
            - 1
