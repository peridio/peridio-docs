    get:
      operationId: retrieve-a-binary
      summary: Retrieve a binary
      tags:
        - "Binaries"
      parameters:
        - name: binary_prn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/prn"
      responses:
        "200":
