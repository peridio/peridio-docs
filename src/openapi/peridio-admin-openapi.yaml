paths:
  /artifacts:
    post:
      operationId: create-an-artifact
      summary: Create an artifact
      tags:
        - "Artifacts"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                custom_metadata:
                  $ref: "#/components/schemas/custom-metadata-artifact"
                description:
                  $ref: "#/components/schemas/artifact-description"
                id:
                  $ref: "#/components/schemas/custom-id"
                name:
                  $ref: "#/components/schemas/artifact-name"
              required:
                - name
      responses:
        "201":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  artifact:
                    $ref: "#/components/schemas/artifact"
    get:
      operationId: list-artifacts
      summary: List artifacts
      description: |
        **Search**

        This resource has the following searchable fields.

        |Key|Required|Operators|Value|
        |-|-|-|-|
        |`description`||`:`, `~`|string|
        |`inserted_at`||`:`, `>`, `>=`, `<`, `<=`|date-time|
        |`name`||`:`, `~`, `-`|string|
        |`prn`||`:`|string|
        |`updated_at`||`:`, `>`, `>=`, `<`, `<=` |date-time|

      tags:
        - "Artifacts"
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  artifacts:
                    $ref: "#/components/schemas/array-of-artifacts"
                  next_page:
                    $ref: "#/components/schemas/next-page"
  /artifacts/{artifact_prn}:
    get:
      operationId: retrieve-an-artifact
      summary: Retrieve an artifact
      tags:
        - "Artifacts"
      parameters:
        - name: artifact_prn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/prn"
      responses:
        "200":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  artifact:
                    $ref: "#/components/schemas/artifact"
    patch:
      operationId: update-an-artifact
      summary: Update an artifact
      tags:
        - "Artifacts"
      parameters:
        - name: artifact_prn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/prn"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                custom_metadata:
                  $ref: "#/components/schemas/custom-metadata-artifact"
                description:
                  $ref: "#/components/schemas/artifact-description"
                name:
                  $ref: "#/components/schemas/artifact-name"
      responses:
        "200":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  artifact:
                    $ref: "#/components/schemas/artifact"
    delete:
      operationId: delete-an-artifact
      summary: Delete an artifact
      tags:
        - "Artifacts"
      parameters:
        - name: artifact_prn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/prn"
      responses:
        "204":
          description: No Content.
