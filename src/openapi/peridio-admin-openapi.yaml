  /devices/{device_prn}/update:
    post:
      security:
        - api_key_v2: []
      operationId: devices-get-update
      summary: Get device update
      description: |
        Returns information regarding whether an update is available via a [release](/platform/reference/releases) or [bundle override](/platform/reference/bundle-overrides).
      tags:
        - "Devices"
      parameters:
        - name: device_prn
          in: path
          required: true
          schema:
            description: The PRN of the device you wish to check for an update for.
            $ref: "#/components/schemas/prn"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                release_prn:
                  examples:
                    [
                      prn:1:a1ed0c4e-f222-4bb3-89dc-48320018875d:release:e4bf3021-b8d7-42d5-a1bd-52121427ebd0,
                    ]
                  description: The PRN of the release to consider as the device's current release during bundle resolution.
                  $ref: "#/components/schemas/prn"
                bundle_prn:
                  examples:
                    [
                      prn:1:a1ed0c4e-f222-4bb3-89dc-48320018875d:bundle:ddd32c59-fc35-4202-a520-a4eddaa11fb3,
                    ]
                  description: The PRN of the bundle to consider as the device's current bundle during bundle resolution.
                  $ref: "#/components/schemas/prn"
                release_version:
                  examples: [1.0.0]
                  description: The version to consider as the device's current release version during bundle resolution.
                  $ref: "#/components/schemas/release-version"
                write:
                  description: Whether the server's record of what the device's current state is will be updated in reaction to the release PRN, bundle PRN, and release version parameters if they are also supplied.
                  type: boolean
                  default: false
              anyOf:
                - required: [release_prn]
                - required: [bundle_prn]
                - required: [release_version]
      responses:
        "200":
          description: Ok.
          content:
            application/json:
              schema:
                properties:
                  status:
                    enum:
                      - "update"
                      - "no_update"
                      - "device_quarantine"
                  source_type:
                    enum:
                      - "release"
                      - "bundle_override"
                      - null
                    description: |
                      The "source" of the bundle update - from a release, or a bundle override.
                  source_prn:
                    $ref: "#/components/schemas/prn"
                    description: |
                      The "source" prn, could be either a release prn or a bundle override prn
                  bundle_prn:
                    $ref: "#/components/schemas/prn"
                    description: |
                      The bundle associated with `source`.
                  manifest:
                    $ref: "#/components/schemas/manifest"
