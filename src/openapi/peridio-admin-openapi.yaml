      maxLength: 256
    artifact-version-version:
      type: string
      minLength: 1
      maxLength: 128
    binary:
      type: object
      properties:
        artifact_version_prn:
          $ref: "#/components/schemas/prn"
        custom_metadata:
          oneOf:
            - $ref: "#/components/schemas/custom-metadata-binary"
